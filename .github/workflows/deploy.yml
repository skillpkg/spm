name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all services (API + Web + Admin)'
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Pre-deploy
    uses: ./.github/workflows/ci.yml

  # Detect which packages changed to skip unnecessary deploys
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'packages/api/**'
              - 'packages/shared/**'
              - 'migrations/**'
            web:
              - 'packages/web/**'
              - 'packages/ui/**'
              - 'packages/shared/**'
              - 'packages/web-auth/**'
            admin:
              - 'packages/admin/**'
              - 'packages/ui/**'
              - 'packages/shared/**'
              - 'packages/web-auth/**'

  deploy-api:
    name: Deploy API Worker
    needs: [quality, changes]
    if: needs.changes.outputs.api == 'true' || contains(github.event.head_commit.message, '[deploy all]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter @spm/shared
      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @spm/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    name: Deploy Web
    needs: [quality, changes]
    if: needs.changes.outputs.web == 'true' || contains(github.event.head_commit.message, '[deploy all]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter @spm/web
        env:
          VITE_API_URL: https://registry.skillpkg.dev/api/v1
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy packages/web/dist --project-name=spm-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-admin:
    name: Deploy Admin
    needs: [quality, changes]
    if: needs.changes.outputs.admin == 'true' || contains(github.event.head_commit.message, '[deploy all]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter @spm/admin
        env:
          VITE_API_URL: https://registry.skillpkg.dev/api/v1
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy packages/admin/dist --project-name=spm-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
