name: Sync Claude Plugin

on:
  push:
    branches: [main]
    paths:
      - 'packages/claude-plugin/**'
  workflow_dispatch:

# Requires a PLUGIN_SYNC_TOKEN secret:
# Fine-grained PAT with Contents:write on skillpkg/claude-plugin

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract plugin version
        id: version
        run: |
          VERSION=$(jq -r '.version' packages/claude-plugin/.claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push subtree to standalone repo
        env:
          SYNC_TOKEN: ${{ secrets.PLUGIN_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::PLUGIN_SYNC_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token length: ${#SYNC_TOKEN}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git subtree split --prefix packages/claude-plugin -b plugin-split

          REMOTE_URL="https://x-access-token:${SYNC_TOKEN}@github.com/skillpkg/claude-plugin.git"
          git remote remove plugin 2>/dev/null || true
          git remote add plugin "${REMOTE_URL}"
          git push plugin plugin-split:main --force

      - name: Tag release
        env:
          SYNC_TOKEN: ${{ secrets.PLUGIN_SYNC_TOKEN }}
        run: |
          git tag "v${{ steps.version.outputs.version }}" plugin-split || true
          git push plugin "v${{ steps.version.outputs.version }}" --force || true
