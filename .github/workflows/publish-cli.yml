name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        default: "cli-npm"
        type: choice
        options:
          - cli-npm
          - mcp
  release:
    types: [published]

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  cli-npm:
    name: Publish @skillpkg/cli
    if: github.event_name == 'release' || inputs.package == 'cli-npm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm must be installed before setup-node because setup-node@v5
      # auto-detects pnpm-lock.yaml at the repo root and tries to invoke
      # pnpm for caching, even though this job only uses npm.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set version from release tag
        if: github.event_name == 'release'
        working-directory: packages/cli-npm
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          npm version "${VERSION#v}" --no-git-tag-version

      - name: Publish @skillpkg/cli
        working-directory: packages/cli-npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  mcp:
    name: Publish @skillpkg/mcp
    if: inputs.package == 'mcp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter @skillpkg/mcp... build

      - name: Publish @skillpkg/mcp
        working-directory: packages/mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
