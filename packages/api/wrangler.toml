name = "spm-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Custom domain — routes all traffic from registry.skillpkg.dev to this Worker
routes = [
  { pattern = "registry.skillpkg.dev/*", zone_name = "skillpkg.dev" }
]

[vars]
ENVIRONMENT = "production"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "spm-packages"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "134b73cb8a544ed8b32e2fd1a3ca0123"

[env.staging]
name = "spm-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.dev]
name = "spm-api-dev"
[env.dev.vars]
ENVIRONMENT = "development"
